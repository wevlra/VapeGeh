<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover" />
    <title>VapeGeh</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #1a1a1a;
            color: #fff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .splash-logo {
            width: 180px;
            height: auto;
            margin-bottom: 24px;
            opacity: 0;
            animation: fadeIn 0.6s ease forwards;
        }
        .splash-title {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 1px;
            opacity: 0;
            animation: fadeIn 0.6s ease 0.2s forwards;
        }
        .splash-loader {
            margin-top: 32px;
            width: 32px;
            height: 32px;
            border: 3px solid rgba(255,255,255,0.15);
            border-top-color: #b8860b;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            opacity: 0;
            animation: spin 0.8s linear infinite, fadeIn 0.4s ease 0.5s forwards;
        }
        @keyframes fadeIn { to { opacity: 1; } }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <img class="splash-logo" src="splash-logo.png" alt="VapeGeh" />
    <div class="splash-title">VapeGeh</div>
    <div class="splash-loader"></div>

    <script src="capacitor-bridge.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            setTimeout(function () {
                window.location.href = 'https://vapegeh.wevlra.dev';
            }, 1200);
        });
    </script>
</body>
</html>
