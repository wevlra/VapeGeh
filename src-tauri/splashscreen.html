<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>VapeGeh</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            overflow: hidden;
        }
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
        }
        .logo {
            width: 160px;
            height: 160px;
            animation: pulse 2s ease-in-out infinite;
        }
        .logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 4px 20px rgba(245, 158, 11, 0.3));
        }
        .app-name {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 2px;
            color: #f59e0b;
        }
        .loading {
            display: flex;
            gap: 6px;
            margin-top: 8px;
        }
        .loading span {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #f59e0b;
            animation: bounce 1.4s ease-in-out infinite;
        }
        .loading span:nth-child(2) { animation-delay: 0.2s; }
        .loading span:nth-child(3) { animation-delay: 0.4s; }
        .status {
            font-size: 12px;
            color: rgba(255,255,255,0.5);
            margin-top: 4px;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        @keyframes bounce {
            0%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-12px); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAIAAAACACAYAAADDPmHL" alt="VapeGeh">
        </div>
        <div class="app-name">VAPEGEH</div>
        <div class="loading">
            <span></span><span></span><span></span>
        </div>
        <div class="status">Memuat aplikasi...</div>
    </div>
</body>
</html>
